name: Test Examples

on:
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - main

# HINT(lukasmalkmus): Make sure the workflow is only ever run for the latest
# changes in a PR or a commit that was pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# HINT(lukasmalkmus): Test all code examples against the staging environment.
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    # HINT(lukasmalkmus): Only run example tests for PRs originating from the
    # upstream repository and for commits that were pushed to upstream.
    if: github.event.pull_request.head.repo.full_name == github.repository ||
      github.event.push.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        example:
          - adk
          - apex
          - ingestevent
          - ingestfile
          # HINT(lukasmalkmus): We do not test this example as it takes too long!
          # - ingesthackernews
          - logrus
          - otelinstrument
          - oteltraces
          - query
          - querylegacy
          - slog
          - zap
          - zerolog
        include:
          - example: adk
            setup: |
              axiom dataset create -n=$AXIOM_TRACES_DATASET -d="ADK traces"
              axiom dataset create -n=$AXIOM_LOGS_DATASET -d="ADK logs"
              cat > logs.json <<'EOF'
              [
                {"level":"info","service":"api","msg":"Request processed","duration_ms":42,"status":200,"path":"/v1/query"},
                {"level":"info","service":"api","msg":"Request processed","duration_ms":187,"status":200,"path":"/v1/ingest"},
                {"level":"warn","service":"api","msg":"Slow query detected","duration_ms":3201,"status":200,"path":"/v1/query"},
                {"level":"error","service":"ingest","msg":"Failed to parse payload","status":400,"path":"/v1/ingest"},
                {"level":"info","service":"auth","msg":"User authenticated","user":"alice@example.com","method":"api_token"},
                {"level":"info","service":"auth","msg":"User authenticated","user":"bob@example.com","method":"personal_token"},
                {"level":"info","service":"api","msg":"Request processed","duration_ms":15,"status":200,"path":"/v1/datasets"},
                {"level":"info","service":"api","msg":"Request processed","duration_ms":95,"status":200,"path":"/v1/query"},
                {"level":"warn","service":"ingest","msg":"Rate limit approaching","current_rate":4500,"limit":5000},
                {"level":"error","service":"api","msg":"Internal server error","status":500,"path":"/v1/query","trace_id":"abc123"}
              ]
              EOF
              axiom ingest $AXIOM_DATASET -f=logs.json
              sleep 5
            verify: |
              sleep 5
              axiom query -f=json "['$AXIOM_TRACES_DATASET'] | count" | jq -e '. >= 1'
              axiom query -f=json "['$AXIOM_LOGS_DATASET'] | count" | jq -e '. >= 1'
          - example: apex
            verify: |
              axiom query -f=json "['$AXIOM_DATASET'] | count" | jq -e '. == 3'
          - example: ingestevent
            verify: |
              axiom query -f=json "['$AXIOM_DATASET'] | count" | jq -e '. == 2'
          - example: ingestfile
            setup: |
              echo '[{"timestamp":"'$(date +%s)'","mood":"hyped","msg":"This is awesome!"}]' >> logs.json
            verify: |
              axiom query -f=json "['$AXIOM_DATASET'] | count" | jq -e '. == 1'
          - example: logrus
            verify: |
              axiom query -f=json "['$AXIOM_DATASET'] | count" | jq -e '. == 3'
          - example: otelinstrument
            verify: |
              axiom query -f=json "['$AXIOM_DATASET'] | count" | jq -e '. >= 1'
          - example: oteltraces
            verify: |
              axiom query -f=json "['$AXIOM_DATASET'] | count" | jq -e '. == 2'
          - example: query
            setup: |
              echo '[{"mood":"hyped","msg":"This is awesome!"}]' >> logs.json
              axiom ingest $AXIOM_DATASET -f=logs.json -f=logs.json -f=logs.json
              sleep 5
          - example: querylegacy
            setup: |
              echo '[{"mood":"hyped","msg":"This is awesome!"}]' >> logs.json
              axiom ingest $AXIOM_DATASET -f=logs.json -f=logs.json -f=logs.json
              sleep 5
          - example: slog
            verify: |
              axiom query -f=json "['$AXIOM_DATASET'] | count" | jq -e '. == 3'
          - example: zap
            verify: |
              axiom query -f=json "['$AXIOM_DATASET'] | count" | jq -e '. == 3'
          - example: zerolog
            verify: |
              axiom query -f=json "['$AXIOM_DATASET'] | count" | jq -e '. == 3'
    env:
      AXIOM_URL: ${{ secrets.TESTING_STAGING_API_URL }}
      AXIOM_TOKEN: ${{ secrets.TESTING_STAGING_TOKEN }}
      AXIOM_ORG_ID: ${{ secrets.TESTING_STAGING_ORG_ID }}
      AXIOM_DATASET: test-axiom-go-examples-${{ github.run_id }}-${{ matrix.example }}
      AXIOM_TRACES_DATASET: test-axiom-go-examples-${{ github.run_id }}-${{ matrix.example }}-traces
      AXIOM_LOGS_DATASET: test-axiom-go-examples-${{ github.run_id }}-${{ matrix.example }}-logs
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Setup test dataset
        run: |
          curl -sL $(curl -s https://api.github.com/repos/axiomhq/cli/releases/tags/v0.14.0 | grep "http.*linux_amd64.tar.gz" | awk '{print $2}' | sed 's|[\"\,]*||g') | tar xzvf - --strip-components=1 --wildcards -C /usr/local/bin "axiom_*_linux_amd64/axiom"
          axiom dataset create -n=$AXIOM_DATASET -d="Axiom Go ${{ matrix.example }} example test"
      - name: Setup example
        if: matrix.setup
        run: ${{ matrix.setup }}
      - name: Run example
        run: go run ./examples/${{ matrix.example }}
      - name: Verify example
        if: matrix.verify
        run: ${{ matrix.verify }}
      - name: Delete test dataset
        if: always()
        run: axiom dataset delete -f $AXIOM_DATASET
      - name: Delete extra adk datasets
        if: always() && matrix.example == 'adk'
        run: |
          axiom dataset delete -f $AXIOM_TRACES_DATASET
          axiom dataset delete -f $AXIOM_LOGS_DATASET

  examples-pass:
    name: Examples Pass
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - if: needs.test.result != 'success' && needs.test.result != 'skipped'
        run: exit 1
